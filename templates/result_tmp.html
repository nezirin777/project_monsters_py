{% extends "base_tmp.html" %}

{% block content %}
    <div id="result">
        <span>{{ mes }}</span>
    </div>

    {{ html | safe }}

    {% if mode %}
      <form action="{{ Conf.cgi_url }}" method="post">
        <input type="hidden" name="mode" value="{{ mode }}">
        <input type="hidden" name="token" value="{{ token }}">
        <button type="submit">{{ button_name }}</button>
      </form>
    {% endif %}

    {% if not kanri %}
        {% include "my_page_button_tmp.html" %}
    {% else %}
        {% include "kanri_page_button_tmp.html" %}
    {% endif %}


{% endblock %}
