<!-- templates/kanri_mon_present_tmp.html -->

{% extends "base_tmp.html" %}

{% block head %}
<link href="./css_js/admin.css" rel="stylesheet">
<link href="./css_js/slimselect.css" rel="stylesheet">
<script src="./css_js/slimselect.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.ss-user-select').forEach(el => {
      new SlimSelect({
        select: el,
        settings: {
          placeholderText: '対象を選択...',
          allowDeselect: true,
          searchPlaceholder: '検索...'
        }
      });
    });
  });
</script>
{% endblock %}

{% block content %}

<div class="admin-header">
  <div class="admin-header__title">モンスター配布</div>
</div>

<div class="admin-select-section">
  <div class="admin-select-section__target">
    対象ユーザー: <span>{{ target_name }}</span>
  </div>
  <form action="{{ Conf.kanri_url }}" method="post" class="form">

    <div class="admin-field">
      <label class="admin-field__label">配布モンスター</label>
      <select name="mons_name" class="ss-user-select admin-select">
        <option value="" hidden>選択してください</option>
        {% for name in monster_names %}
        <option value="{{ name }}">{{ name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="admin-field">
      <label class="admin-field__label">性別</label>
      <select name="sex" class="admin-select">
        <option value="" hidden>選択してください</option>
        <option value="陰">陰</option>
        <option value="陽">陽</option>
      </select>
    </div>

    <div class="admin-field">
      <label class="admin-field__label">MAXレベル</label>
      <input type="number" name="max_level" class="admin-input" min="10" value="10" required>
    </div>

    <div class="admin-field">
      <label class="admin-field__label">配合回数</label>
      <input type="number" name="haigou" class="admin-input" min="0" value="0" required>
    </div>

    <input type="hidden" name="mode" value="MON_PRESENT_OK">
    <input type="hidden" name="target_name" value="{{ target_name }}">
    <input type="hidden" name="token" value="{{ token }}">
    <button type="submit" class="admin-btn admin-btn--block">配布する</button>
  </form>
</div>

{% include "kanri_page_button_tmp.html" %}

{% endblock %}
