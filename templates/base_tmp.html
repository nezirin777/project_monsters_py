<!-- templates/base_tmp.html -->

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title> MONSTER'S 改 {{ Conf.ver }}</title>
    <link rel="stylesheet" href="./css_js/style.css">
    <script src="./css_js/jquery.min.js"></script>
    <script src="./css_js/main.js"></script>

    {% if script %}
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            main(
                "{{ Conf.imgpath | e }}/",
                "{{ script.party | e }}",
            );
        });
    </script>
    {% endif %}
    {% if flash_msg  %}
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        showToast({{ flash_msg | tojson }}, "{{ flash_type or 'error' }}");
            });
    </script>
    {% endif %}

    {% block head %}{% endblock %}

</head>
<body>

    {% include "ui_extra_tmp.html" %}

    <div class="wrapper">
        {% block content %}{% endblock %}
    </div>

    {% if battle_txt %}
    {{ battle_txt }}
    {% endif %}


    {% include "footer_tmp.html" %}


</body>
</html>
