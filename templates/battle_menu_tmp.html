<!-- templates/battle_menu_tmp.html -->

<div class="card battle-menu content-md">
  <div class="card__header">行動を選択して下さい！</div>

  <div class="card__body">
    <form action="{{ Conf.cgi_url }}" method="post" class="form">

      <div class="layout-grid" style="--grid-min: 280px; width:100%;">
        {% for pt in party %}
          {% if pt.hp != 0 and pt.hp != "0" %}
          <div class="cmd-card">

            <div class="cmd-card__header">
              <div class="cmd-card__img">
                <img src="{{ Conf.imgpath }}/{{ pt.name }}.gif" alt="{{ pt.name }}">
              </div>
              <div class="cmd-card__info">
                <div class="cmd-card__name">{{ pt.name }}</div>
                <div class="cmd-card__stats">
                  <div class="cmd-card__stat">
                    <span class="cmd-card__stat-label">LV</span> {{ pt.lv }}
                  </div>
                  <div class="cmd-card__stat">
                    <span class="cmd-card__stat-label">HP</span> {{ pt.hp }} / {{ pt.mhp }}
                  </div>
                  <div class="cmd-card__stat">
                    <span class="cmd-card__stat-label">MP</span> {{ pt.mp }} / {{ pt.mmp }}
                  </div>
                </div>
              </div>
            </div>

            <div class="cmd-card__actions">

              <div class="cmd-card__row">
                <div class="cmd-card__row-label">行動選択</div>
                <select name="hit{{ pt.no }}" class="form-control">
                  <option value="攻撃">攻撃</option>
                  {% if not special_flag %}
                  <option value="防御">防御する</option>
                  <option value="回復">回復魔法使用</option>
                  {% endif %}
                </select>
              </div>

              <div class="cmd-card__row">
                <div class="cmd-card__row-label">攻撃相手</div>
                <select name="target{{ pt.no }}" class="form-control">
                  {% for enemy in valid_enemies %}
                  <option value="{{ enemy.index }}">{{ enemy.name2 }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="cmd-card__row">
                <div class="cmd-card__row-label">特技</div>
                <select name="toku{{ pt.no }}" class="form-control">
                  {% for skill in attack_skills %}
                  <option value="{{ skill.name }}" {% if skill.selected %}selected{% endif %}>
                    {{ skill.name }} {% if not special_flag %}({{ skill.mp }} MP){% endif %}
                  </option>
                  {% endfor %}
                </select>
              </div>

              {% if not special_flag %}
              <div class="cmd-card__row">
                <div class="cmd-card__row-label">回復相手</div>
                <select name="nakama{{ pt.no }}" class="form-control">
                  {% for member in valid_party %}
                  <option value="{{ member.index }}">{{ member.name }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="cmd-card__row">
                <div class="cmd-card__row-label">回復魔法</div>
                <select name="ktoku{{ pt.no }}" class="form-control">
                  <option value="0">使用しない</option>
                  {% for skill in heal_skills %}
                  <option value="{{ skill.name }}">{{ skill.name }} ({{ skill.mp }} MP)</option>
                  {% endfor %}
                </select>
              </div>
              {% endif %}

            </div>
          </div>
          {% endif %}
        {% endfor %}
      </div>

      <div class="layout-cluster" style="margin-top: var(--space-m);">
        <button type="submit" name="monok" value="決定"
                class="btn btn--block battle-btn">決　定</button>
        <input type="hidden" name="mode" value="battle_fight">
        <input type="hidden" name="token" value="{{ token }}">
      </div>

    </form>
  </div>
</div>
