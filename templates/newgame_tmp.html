<!-- templates/newgame_tmp.html -->

{% extends "base_tmp.html" %}

{% block content %}

<div class="card content-sm" style="margin: var(--space-m) auto;">
  <div class="card__header">新規ユーザー登録</div>
  <div class="card__desc">
    ユーザー名・パスワードを設定してください<br>
    <small>(20文字以内。ユーザー名はひらがな等もOK。パスワードは英数字のみ)</small>
  </div>
  <div class="card__body">
    <form action="{{ Conf.reg_url }}" method="post" class="form">
      <div class="form-group">
        <label class="form-label">ユーザー名</label>
        <input type="text" name="new_user_name" class="form-control" maxlength="20" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <input type="password" name="new_password" class="form-control" maxlength="20" autocomplete="new-password"
          required>
      </div>
      <button type="submit" class="btn btn--block">登 録</button>
      <input type="hidden" name="mode" value="sinki">
      <input type="hidden" name="token" value="{{ token }}">
    </form>
  </div>
</div>

{% endblock %}
