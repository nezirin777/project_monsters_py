<!-- templates/my_page_shoplist_tmp.html -->

<div class="card" id="shop-section">
  <div class="card__header">施設色々</div>
  <div class="card__desc">
    <span id="link_msg">説明がここに。</span>
  </div>

  {% if omiai_status == "baby" or omiai_status == "request" %}
  <div class="omiai-banner">
    {% if omiai_status == "baby" %}
    <img src="{{ Conf.imgpath }}/omiai_baby.png" alt="お見合いベビー">
    {% elif omiai_status == "request" %}
    <img src="{{ Conf.imgpath }}/omiai_irai.png" alt="お見合い依頼">
    {% endif %}
  </div>
  {% endif %}

  <!-- JS依存: my_page_menu4 はホバー説明文の読み取り対象 -->
  <div class="shop-grid my_page_menu4">

    <form action="{{ Conf.cgi_url }}" method="post">
      <span data-msg="モンスターに本を読ませて性格を変更させる事が出来ます。" class="shop-span">
        <button type="submit" class="btn btn--block">本屋に入室</button>
        <input type="hidden" name="mode" value="books">
        <input type="hidden" name="token" value="{{ token }}">
      </span>
    </form>

    <form action="{{ Conf.cgi_url }}" method="post" data-confirm="宿屋に宿泊しますか？" data-loading="宿泊中...">
      <span data-msg="ｺﾞｰﾙﾄﾞを支払ってHP･MPを完全に回復させます。" class="shop-span">
        <button type="submit" class="btn btn--block">宿屋({{ yadoya_cost_v }}G)</button>
        <input type="hidden" name="mode" value="yadoya">
        <input type="hidden" name="yadodai" value="{{ yadoya_cost }}">
        <input type="hidden" name="money" value="{{ user.money }}">
        <input type="hidden" name="token" value="{{ token }}">
      </span>
    </form>

    <form action="{{ Conf.cgi_url }}" method="post" data-confirm="お祈りしますか？" data-loading="お祈り中...">
      <span data-msg="ｺﾞｰﾙﾄﾞを支払って死亡したモンスターを復活させます。" class="shop-span">
        <button type="submit" class="btn btn--block">教会({{ kyoukai_cost_v }}G)</button>
        <input type="hidden" name="mode" value="kyoukai">
        <input type="hidden" name="token" value="{{ token }}">
      </span>
    </form>

    <form action="{{ Conf.cgi_url }}" method="post">
      <span data-msg="モンスターを預けることが出来ます" class="shop-span">
        <button type="submit" class="btn btn--block" {{park_get}}>モンスターパーク</button>
        <input type="hidden" name="mode" value="park">
        <input type="hidden" name="token" value="{{ token }}">
      </span>
    </form>

    <form action="{{ Conf.cgi_url }}" method="post">
      <span data-msg="メダルやGを使いモンスター等を交換できます。" class="shop-span">
        <button type="submit" class="btn btn--block">交換所</button>
        <input type="hidden" name="mode" value="medal_shop">
        <input type="hidden" name="token" value="{{ token }}">
      </span>
    </form>

    <form action="{{ Conf.cgi_url }}" method="post">
      <span data-msg="モンスターを購入できます" class="shop-span">
        <button type="submit" class="btn btn--block">VIP交換所1</button>
        <input type="hidden" name="mode" value="v_shop">
        <input type="hidden" name="token" value="{{ token }}">
      </span>
    </form>

    <form action="{{ Conf.cgi_url }}" method="post">
      <span data-msg="アイテム等を購入できます" class="shop-span">
        <button type="submit" class="btn btn--block">VIP交換所2</button>
        <input type="hidden" name="mode" value="v_shop2">
        <input type="hidden" name="token" value="{{ token }}">
      </span>
    </form>

    <form action="{{ Conf.cgi_url }}" method="post">
      <span data-msg="他のユーザーとお見合いができます" class="shop-span">
        <button type="submit" class="btn btn--block">お見合い所</button>
        <input type="hidden" name="mode" value="omiai_room">
        <input type="hidden" name="token" value="{{ token }}">
      </span>
    </form>

    <form action="{{ Conf.cgi_url }}" method="post">
      <span data-msg="ユーザー名を変更できます" class="shop-span">
        <button type="submit" class="btn btn--block">ユーザー名変更所</button>
        <input type="hidden" name="mode" value="name_change">
        <input type="hidden" name="token" value="{{ token }}">
      </span>
    </form>

  </div>
</div>
