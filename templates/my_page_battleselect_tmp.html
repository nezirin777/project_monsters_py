<!-- templates/my_page_battleselect_tmp.html -->

<div class="action-card">
  <!-- ヘッダーと説明文 -->
  <div class="action-card-header">戦 闘</div>
  <div class="action-card-desc">
    KEYやモンスターが入手出来ます。<br>
    <small>KEYは一番深い階層を選択した時にしか出現しません。</small>
  </div>

  <!-- 戦闘選択フォームのグリッド -->
  <div class="battle-options-grid">

    <!-- 最深階 -->
    <div class="battle-option-box">
      <div class="battle-option-title">【 最 深 階 】</div>
      <form action="{{ Conf.cgi_url }}" method="post" class="battle-form battle_go">
        <div class="battle-inputs">
          <select name="in_room" class="battle-select">
            <option value="通常">通常の部屋</option>
            {% for room in room_key_display %}
              {% if room.has_key %}
                <option value="{{ room.name }}" {% if room.selected %}selected{% endif %}>{{ room.name }}の部屋</option>
              {% endif %}
            {% endfor %}
          </select>
          <span class="battle-text">の地下</span>
          <input type="number" min="1" max="{{ user.key }}" name="in_floor" value="{{ user.key }}" class="battle-number">
          <span class="battle-text">Fに</span>
        </div>
        <button type="submit" class="submit-btn battle-btn" disabled>戦闘に行く！</button>
        <input type="hidden" name="mode" value="battle_type">
        <input type="hidden" name="token" value="{{ token }}">
      </form>
    </div>

    <!-- 前対戦階 -->
    <div class="battle-option-box">
      <div class="battle-option-title">【 前対戦階 】</div>
      <form action="{{ Conf.cgi_url }}" method="post" class="battle-form battle_go">
        <div class="battle-inputs">
          <select name="in_room" class="battle-select">
            <option value="通常">通常の部屋</option>
            {% for room in room_key_display %}
              {% if room.has_key %}
                <option value="{{ room.name }}" {% if room.selected %}selected{% endif %}>{{ room.name }}の部屋</option>
              {% endif %}
            {% endfor %}
          </select>
          <span class="battle-text">の地下</span>
          <input type="number" min="1" max="{{ user.key }}" name="in_floor" value="{{ last_floor }}" class="battle-number">
          <span class="battle-text">Fに</span>
        </div>
        <button type="submit" class="submit-btn battle-btn" disabled>戦闘に行く！</button>
        <input type="hidden" name="mode" value="battle_type">
        <input type="hidden" name="token" value="{{ token }}">
      </form>
    </div>

    <!-- 異世界:最深階 -->
    <div class="battle-option-box {{ isekai }}">
      <div class="battle-option-title">【 異世界:最深階 】</div>
      <form action="{{ Conf.cgi_url }}" method="post" class="battle-form battle_go">
        <div class="battle-inputs">
          <span class="battle-text">異世界の地下</span>
          <input type="number" min="1" max="{{ isekai_next }}" name="in_isekai" value="{{ isekai_next }}" class="battle-number">
          <span class="battle-text">Fに</span>
        </div>
        <button type="submit" class="submit-btn battle-btn" disabled>探索に行く！</button>
        <input type="hidden" name="mode" value="battle_type2">
        <input type="hidden" name="in_room" value="異世界">
        <input type="hidden" name="token" value="{{ token }}">
      </form>
    </div>

    <!-- 異世界:前探索階 -->
    <div class="battle-option-box {{ isekai }}">
      <div class="battle-option-title">【 異世界:前探索階 】</div>
      <form action="{{ Conf.cgi_url }}" method="post" class="battle-form battle_go">
        <div class="battle-inputs">
          <span class="battle-text">異世界の地下</span>
          <input type="number" min="1" max="{{ isekai_next }}" name="in_isekai" value="{{ last_floor_isekai }}" class="battle-number">
          <span class="battle-text">Fに</span>
        </div>
        <button type="submit" class="submit-btn battle-btn" disabled>探索に行く！</button>
        <input type="hidden" name="mode" value="battle_type2">
        <input type="hidden" name="in_room" value="異世界">
        <input type="hidden" name="token" value="{{ token }}">
      </form>
    </div>

  </div>
</div>
