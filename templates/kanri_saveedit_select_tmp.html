<!-- templates/kanri_saveedit_select_tmp.html -->

{% extends "base_tmp.html" %}

{% block head %}
<link href="./css_js/admin.css" rel="stylesheet">
{% endblock %}

{% block content %}

<div class="admin-header">
  <div class="admin-header__title">セーブデータ編集</div>
</div>

<div class="admin-select-section">
  <div class="admin-select-section__target">
    対象ユーザー: <span>{{ target_name }}</span>
  </div>
  <form action="{{ Conf.kanri_url }}" method="post" class="form">
    <div class="admin-field">
      <label class="admin-field__label">編集するデータを選択</label>
      <select name="target_data" class="admin-select">
        <option value="" hidden>対象データを選択</option>
        <option value="user_data">ユーザーデータ</option>
        <option value="party_data">パーティデータ</option>
        <option value="room_key_data">所持部屋の鍵データ</option>
        <option value="waza_data">取得特技データ</option>
        <option value="zukan_data">図鑑データ</option>
        <option value="park_data">モンスターパークデータ</option>
        <option value="vips_data">vipsデータ</option>
      </select>
    </div>
    <input type="hidden" name="mode" value="save_editer">
    <input type="hidden" name="target_name" value="{{ target_name }}">
    <input type="hidden" name="token" value="{{ token }}">
    <button type="submit" class="admin-btn admin-btn--block">データ決定</button>
  </form>
</div>

{% include "kanri_page_button_tmp.html" %}

{% endblock %}
