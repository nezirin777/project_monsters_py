<!-- templates/name_change_tmp.html -->

{% extends "base_tmp.html" %}

{% block content %}

<!-- 名前変更入力画面 -->
<div id="result">
  <span>ユーザー名を変更します<br>
    使用可能な文字は半角/全角英数字及び日本語です<br>
    （一部特殊文字は使用できません）</span>
</div>

<br>

<div class="my_page">
  <form action="{{ Conf.cgi_url }}" method="post" class="form" id="nameChangeForm" data-confirm="ユーザー名を変更します。本当によろしいですか？" data-loading="名前を変更中...">
    <div class="form_row">
      現在の名前：
      <input type="text" size="20" value="{{ current_name }}" disabled>
    </div>

    <div class="form_row">
      新しい名前：
      <input type="text" size="20" name="new_name" id="newNameInput" value="" maxlength="20" required>
    </div>

    <input type="hidden" name="mode" value="name_change_ok">
    <input type="hidden" name="token" value="{{ token }}">
    <input type="hidden" name="name" value="{{ current_name }}">
    <button type="submit">確認する</button>
  </form>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("nameChangeForm");
    const input = document.getElementById("newNameInput");
    const currentName = "{{ current_name }}";

    // 入力欄に変更があるたびに実行される
    input.addEventListener("input", function () {
      const newName = input.value.trim();
      if (newName) {
        // 新しい名前が入力されていれば、メッセージを動的生成
        form.dataset.confirm = `ユーザー名を「${currentName}」から「${newName}」へ変更します。\n本当によろしいですか？`;
      } else {
        // 空欄の場合はデフォルトのメッセージに戻す
        form.dataset.confirm = `ユーザー名を変更します。\n本当によろしいですか？`;
      }
    });
  });
</script>

{% endblock %}
