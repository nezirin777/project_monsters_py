<!-- templates/medal_shop_tmp.html -->

{% extends "base_tmp.html" %}

{% block content %}

<div class="card content-sm" style="margin: var(--space-m) auto;">
  <div class="card__header">交換所</div>
  <div class="card__desc">{{ mes }}</div>
</div>

<div class="layout-cluster content-sm" style="margin: var(--space-m) auto;">
  <div class="status-badge">
    <span class="status-badge__label">所持金</span>
    <span class="status-badge__value">{{ user_v.money }}G</span>
  </div>
  <div class="status-badge">
    <span class="status-badge__label">メダル</span>
    <span class="status-badge__value">{{ user_v.medal }}枚</span>
  </div>
</div>

<form action="{{ Conf.cgi_url }}" id="form_check" method="post" style="width:95%; max-width:900px; margin-inline:auto;">
  {% for category, items in item_lists.items() %}
  <div class="item-select-grid">
    {% for item in items %}
    <label class="item-label">
      <input type="radio" name="m_name" value="{{ item.name }}" required>
      <div class="item-card">
        <div class="item-card__name">{{ item.name }}</div>
        <div class="item-card__price">
          <span class="item-card__price-prefix">{{ item.val1 }}</span>
          <span class="item-card__price-num">{{ item.price }}</span>
          <span class="item-card__price-unit">{{ item.val2 }}</span>
        </div>
      </div>
    </label>
    {% endfor %}
  </div>
  {% endfor %}

  <div class="layout-cluster" style="margin: var(--space-l) auto;">
    <button type="submit" class="btn">交換する</button>
    <input type="hidden" name="mode" value="{{ mode }}">
    <input type="hidden" name="token" value="{{ token }}">
  </div>
</form>

{% include "my_page_button_tmp.html" %}

{% endblock %}
