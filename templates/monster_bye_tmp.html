<!-- templates/monster_bye_tmp.html -->

{% extends "base_tmp.html" %}

{% block content %}

<div class="card content-sm"">
  <div class="card__header">パーティがいっぱいです！</div>
  <div class="card__desc">
    新しく仲間になりたがっているモンスターがいますが、パーティの枠が足りません。<br>
    <span class="red">誰か一人と、お別れする必要があります。</span>
  </div>
  <div class="card__body">
    <form name="img_change" method="post" id="img_change" class="form">

      <select name="Mno" class="form-control monster-select" data-target="img1">
        <option value="99" data-name="{{ get_name }}" selected>
          新しいモンスター : {{ get_name }} {{ Asex }}
        </option>
        {% for pt in party %}
        <option value="{{ loop.index0 }}" data-name="{{ pt.name }}">
          {{ loop.index }}: {{ pt.name }} {{ pt.sex }} LV-{{ pt.lv }} 配合{{ pt.hai }}回
        </option>
        {% endfor %}
      </select>

      <div class="monster-preview">
        <img name="img1" src="{{ Conf.imgpath }}/{{ get_name }}.gif" alt="{{ get_name }}">
      </div>

      <button type="submit" class="btn btn--block" data-confirm="本当にお別れしてもよろしいですか？">
        選択したモンスターと別れる
      </button>

      <input type="hidden" name="mode" value="m_bye">
      <input type="hidden" name="token" value="{{ token }}">
    </form>
  </div>
</div>

{% endblock %}
