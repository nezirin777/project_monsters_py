      h('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', width: 44, flexShrink: 0 } },

        !isLast && h('div', { style: { width: 3, flex: 1, minHeight: 24, background: '#334155' } })
      ),
      h('div', { style: { flex: 1, paddingBottom: isLast ? 0 : 16, paddingLeft: 6 } },
        h('div', { className: 'step-box', style: { background: m.bg, border: `1px solid ${m.color}44`, borderRadius: 10, padding: '14px 18px', marginBottom: step.branch ? 7 : 0 } },
          h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 } },
            h('div', { style: { minWidth: 0 } },

              h('div', { style: { fontSize: 20, color: '#e2e8f0', fontFamily: 'monospace', lineHeight: 1.5 } }, step.func),
              step.note && h('div', { style: { fontSize: 16, color: '#64748b', marginTop: 5, fontStyle: 'italic' } }, step.note)

            h('div', { style: { fontSize: 13, fontWeight: 'bold', color: m.color, background: `${m.color}22`, padding: '4px 9px', borderRadius: 5, whiteSpace: 'nowrap', flexShrink: 0, marginTop: 2 } }, m.label)
          )
        ),
        step.branch && h('div', { style: { marginLeft: 14, marginTop: 4, padding: '7px 13px', background: 'rgba(248,113,113,0.08)', border: '1px solid rgba(248,113,113,0.22)', borderRadius: 6, fontSize: 16, color: '#f87171', display: 'flex', gap: 7, alignItems: 'center' } },
          h('span', null, '⚠'), h('span', null, step.branch)
        )
      )
    );
  }

          return h('div', { key: g },

      h('div', { style: { flex: 1, overflowY: 'auto', padding: '30px 24px' } },
